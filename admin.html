<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <script src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.2/dist/browser-image-compression.min.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة المشاريع - Brain Tech</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --cyan: #00C2D1;
            --bg: #050508;
            --bg2: #0A0A12;
            --text: #E8EDF5;
            --gray: #5A6070;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Cairo', sans-serif;
            overflow-x: hidden;
        }

        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }

        /* HEADER */
        .admin-header {
            background: linear-gradient(135deg, rgba(0,194,209,0.1), rgba(0,194,209,0.05));
            border: 1px solid rgba(0,194,209,0.2);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .admin-header h1 {
            font-size: 1.8rem;
            color: var(--cyan);
        }

        .admin-nav a {
            color: var(--text);
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 8px;
            transition: all 0.3s;
            margin: 0 8px;
        }

        .admin-nav a:hover {
            background: rgba(0,194,209,0.15);
            color: var(--cyan);
        }

        .logout-btn {
            background: rgba(255,80,80,0.1);
            border: 1px solid rgba(255,80,80,0.3);
            color: #ff6666;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background: rgba(255,80,80,0.2);
        }

        /* TABS */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            border-bottom: 1px solid rgba(0,194,209,0.15);
            padding-bottom: 15px;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: transparent;
            border: none;
            color: var(--gray);
            padding: 10px 20px;
            cursor: pointer;
            font-size: 0.95rem;
            border-bottom: 2px solid transparent;
            transition: all 0.3s;
        }

        .tab-btn.active {
            color: var(--cyan);
            border-bottom-color: var(--cyan);
        }

        .tab-btn:hover {
            color: var(--text);
        }

        /* FORM SECTION */
        .form-section {
            background: rgba(10,10,18,0.6);
            border: 1px solid rgba(0,194,209,0.12);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
        }

        .form-section h2 {
            margin-bottom: 20px;
            color: var(--cyan);
            font-size: 1.4rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            color: var(--gray);
            font-size: 0.85rem;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            background: rgba(5,5,8,0.5);
            border: 1px solid rgba(0,194,209,0.15);
            border-radius: 10px;
            padding: 12px;
            color: var(--text);
            font-family: 'Cairo', sans-serif;
            font-size: 0.95rem;
            transition: all 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--cyan);
            background: rgba(0,194,209,0.05);
            box-shadow: 0 0 0 3px rgba(0,194,209,0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .tags-input {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .tag {
            background: rgba(0,194,209,0.1);
            border: 1px solid rgba(0,194,209,0.3);
            color: var(--cyan);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .tag button {
            background: none;
            border: none;
            color: var(--cyan);
            cursor: pointer;
            padding: 0 4px;
        }

        .form-full { grid-column: 1 / -1; }

        .btn-submit {
            background: linear-gradient(135deg, var(--cyan), #00a8b8);
            color: #000;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,194,209,0.3);
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* PROJECTS TABLE */
        .projects-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .projects-table th {
            background: rgba(0,194,209,0.1);
            border: 1px solid rgba(0,194,209,0.15);
            padding: 14px;
            text-align: right;
            color: var(--cyan);
            font-weight: 700;
        }

        .projects-table td {
            border: 1px solid rgba(0,194,209,0.1);
            padding: 14px;
            background: rgba(10,10,18,0.4);
        }

        .projects-table tr:hover {
            background: rgba(0,194,209,0.05);
        }

        .project-img-thumb {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            object-fit: cover;
        }

        .action-btns {
            display: flex;
            gap: 10px;
        }

        .btn-edit, .btn-delete {
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s;
        }

        .btn-edit {
            background: rgba(0,194,209,0.15);
            color: var(--cyan);
        }

        .btn-edit:hover {
            background: rgba(0,194,209,0.3);
        }

        .btn-delete {
            background: rgba(255,80,80,0.15);
            color: #ff6666;
        }

        .btn-delete:hover {
            background: rgba(255,80,80,0.3);
        }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            z-index: 5000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal.open {
            display: flex;
        }

        .modal-content {
            background: #0D0D15;
            border: 1px solid rgba(0,194,209,0.25);
            border-radius: 16px;
            max-width: 500px;
            width: 100%;
            padding: 30px;
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 16px;
            right: 16px;
            background: none;
            border: 1px solid rgba(0,194,209,0.3);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            color: var(--gray);
            cursor: pointer;
            transition: all 0.3s;
        }

        .modal-close:hover {
            color: var(--cyan);
            border-color: var(--cyan);
        }

        .modal-title {
            margin-bottom: 20px;
            color: var(--cyan);
            font-size: 1.3rem;
        }

        /* STATUS MESSAGE */
        .status-msg {
            padding: 14px 18px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
            font-weight: 600;
        }

        .status-msg.show {
            display: block;
        }

        .status-msg.success {
            background: rgba(0,170,102,0.12);
            border: 1px solid rgba(0,170,102,0.3);
            color: #00dd88;
        }

        .status-msg.error {
            background: rgba(255,80,80,0.12);
            border: 1px solid rgba(255,80,80,0.3);
            color: #ff6666;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .container { padding: 15px; }
            .admin-header { padding: 16px; }
            .admin-header h1 { font-size: 1.3rem; }
            .form-section { padding: 20px; }
            .form-grid { grid-template-columns: 1fr; }
            .projects-table { font-size: 0.85rem; }
            .projects-table th, .projects-table td { padding: 10px; }
            .action-btns { flex-direction: column; }
            .btn-edit, .btn-delete { width: 100%; }
        }

        @media (max-width: 480px) {
            .admin-header { flex-direction: column; align-items: flex-start; }
            .admin-nav { display: flex; flex-wrap: wrap; }
            .admin-nav a { margin: 4px 4px 4px 0; }
        }

        /* EMPTY STATE */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--gray);
        }

        .empty-state i {
            font-size: 3rem;
            color: rgba(0,194,209,0.2);
            margin-bottom: 16px;
            display: block;
        }

        /* LOGIN */
        .login-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-box {
            background: rgba(10,10,18,0.8);
            border: 1px solid rgba(0,194,209,0.25);
            border-radius: 16px;
            padding: 40px;
            max-width: 400px;
            width: 100%;
            text-align: center;
        }

        .login-box h2 {
            color: var(--cyan);
            margin-bottom: 10px;
            font-size: 1.6rem;
        }

        .login-box p {
            color: var(--gray);
            margin-bottom: 30px;
        }

        .login-box input {
            width: 100%;
            padding: 12px;
            margin-bottom: 16px;
            background: rgba(5,5,8,0.5);
            border: 1px solid rgba(0,194,209,0.15);
            border-radius: 10px;
            color: var(--text);
            font-family: 'Cairo', sans-serif;
            font-size: 1rem;
        }

        .login-box button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, var(--cyan), #00a8b8);
            color: #000;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }

        .login-box button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,194,209,0.3);
        }
        
    </style>
</head>
<body>
    <!-- LOGIN SECTION -->
    <div id="loginSection" class="login-container">
        <div class="login-box">
            <h2><i class="fas fa-sign-in-alt"></i> تسجيل الدخول</h2>
            <p>أدخل بياناتك للدخول إلى لوحة الإدارة</p>
            <input type="email" id="adminEmail" placeholder="البريد الإلكتروني" required />
            <input type="password" id="adminPassword" placeholder="كلمة المرور" required />
            <button onclick="loginAdmin()">دخول <i class="fas fa-arrow-left"></i></button>
            <div id="loginStatus" style="display:none;margin-top:16px;padding:14px 18px;border-radius:12px;font-size:0.95rem;text-align:center;font-weight:600"></div>
        </div>
    </div>

    <!-- ADMIN SECTION -->
    <div id="adminSection" style="display: none;">
        <div class="container">
            <div class="admin-header">
                <div>
                    <h1><i class="fas fa-cogs"></i> لوحة إدارة المشاريع</h1>
                </div>
                <button class="logout-btn" onclick="logoutAdmin()">
                    <i class="fas fa-sign-out-alt"></i> تسجيل الخروج
                </button>
            </div>

            <div class="tabs">
                <button class="tab-btn active" onclick="showTab(event, 'add-project')">
                    <i class="fas fa-plus"></i> إضافة مشروع
                </button>
                <button class="tab-btn" onclick="showTab(event, 'manage-projects')">
                    <i class="fas fa-list"></i> إدارة المشاريع
                </button>
            </div>

            <!-- ADD PROJECT SECTION -->
            <div id="add-project" class="tab-content">
                <div class="form-section">
                    <h2><i class="fas fa-rocket"></i> إضافة مشروع جديد</h2>
                    <div class="status-msg" id="addStatus"></div>
                    <form id="projectForm" onsubmit="addProject(event)">
                        <div class="form-grid">
                            <div class="form-group">
                                <label>عنوان المشروع *</label>
                                <input type="text" id="projectTitle" required placeholder="مثال: تطبيق IoT">
                            </div>
                            <div class="form-group">
                                <label>الصورة الرئيسية *</label>
                                <input type="file" id="projectImageFile" accept="image/*" style="background: rgba(5,5,8,0.5); border: 1px solid rgba(0,194,209,0.15); border-radius: 10px; padding: 12px; color: var(--text);">
                                <div id="mainImagePreview" style="margin-top: 10px; display: none;">
                                    <img id="mainPreviewImg" style="max-width: 100px; max-height: 100px; border-radius: 8px;">
                                </div>
                                <label style="margin-top: 10px; color: var(--gray);">أو أدخل رابط الصورة يدوياً:</label>
                                <input type="text" id="projectImageUrl" placeholder="https://example.com/image.jpg">
                            </div>
                            <div class="form-group form-full">
                                <label>روابط صور إضافية (اختر ملفات أو أدخل روابط)</label>
                                <input type="file" id="projectImagesFiles" accept="image/*" multiple style="background: rgba(5,5,8,0.5); border: 1px solid rgba(0,194,209,0.15); border-radius: 10px; padding: 12px; color: var(--text);">
                                <div id="extraImagesPreview" style="margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap;"></div>
                                <label style="margin-top: 10px; color: var(--gray);">أو أدخل روابط الصور الإضافية مفصولة بفاصلة:</label>
                                <input type="text" id="projectImagesUrls" placeholder="رابط1, رابط2, رابط3">
                                <small style="color: #5A6070; margin-top: 5px; display: block;">يمكنك اختيار صورة واحدة أو أكثر</small>
                            </div>
                            <div class="form-group">
                                <label>التصنيف *</label>
                                <select id="projectCategory" required>
                                    <option value="">اختر التصنيف</option>
                                    <option value="PCB Design">PCB Design</option>
                                    <option value="Arduino">Arduino / Embedded</option>
                                    <option value="Raspberry Pi">Raspberry Pi</option>
                                    <option value="AI Vision">AI Vision System</option>
                                    <option value="Mobile App">Mobile App</option>
                                    <option value="Web App">Web App</option>
                                    <option value="IoT">IoT Project</option>
                                    <option value="Graduation">مشروع تخرج</option>
                                </select>
                            </div>
                            <div class="form-group form-full">
                                <label>وصف المشروع *</label>
                                <textarea id="projectDescription" required placeholder="اشرح تفاصيل المشروع والتقنيات المستخدمة..."></textarea>
                            </div>
                            <div class="form-group form-full">
                                <label>الوسوم (الكلمات المفتاحية)</label>
                                <input type="text" id="projectTags" placeholder="مثال: IoT, Arduino, Sensors">
                            </div>
                        </div>
                        <button type="submit" class="btn-submit">
                            <i class="fas fa-check"></i> إضافة المشروع
                        </button>
                    </form>
                </div>
            </div>

            <!-- MANAGE PROJECTS SECTION -->
            <div id="manage-projects" class="tab-content" style="display: none;">
                <div class="form-section">
                    <h2><i class="fas fa-edit"></i> المشاريع المضافة</h2>
                    <div class="status-msg" id="manageStatus"></div>
                    <div id="projectsContainer">
                        <div class="empty-state">
                            <i class="fas fa-inbox"></i>
                            <p>لم يتم إضافة أي مشاريع بعد</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- EDIT MODAL -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">×</button>
            <h3 class="modal-title">تعديل المشروع</h3>
            <form id="editForm" onsubmit="saveProject(event)">
                <div class="form-group">
                    <label>عنوان المشروع</label>
                    <input type="text" id="editTitle" required>
                </div>
                <div class="form-group">
                    <label>الصورة الرئيسية</label>
                    <input type="file" id="editImageFile" accept="image/*" style="background: rgba(5,5,8,0.5); border: 1px solid rgba(0,194,209,0.15); border-radius: 10px; padding: 12px; color: var(--text);">
                    <div id="editMainImagePreview" style="margin-top: 10px; display: none;">
                        <img id="editMainPreviewImg" style="max-width: 100px; max-height: 100px; border-radius: 8px;">
                    </div>
                    <label style="margin-top: 10px; color: var(--gray);">أو أدخل رابط الصورة يدوياً:</label>
                    <input type="text" id="editImageUrl" placeholder="https://example.com/image.jpg">
                </div>
                <div class="form-group form-full">
                    <label>صور إضافية</label>
                    <input type="file" id="editImagesFiles" multiple accept="image/*" style="background: rgba(5,5,8,0.5); border: 1px solid rgba(0,194,209,0.15); border-radius: 10px; padding: 12px; color: var(--text);">
                    <div id="editExtraImagesPreview" style="margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap;"></div>
                    <label style="margin-top: 10px; color: var(--gray);">أو أدخل روابط الصور الإضافية مفصولة بفاصلة:</label>
                    <input type="text" id="editImagesUrls" placeholder="رابط1, رابط2, رابط3">
                </div>
                <div class="form-group">
                    <label>التصنيف</label>
                    <select id="editCategory" required>
                        <option value="PCB Design">PCB Design</option>
                        <option value="Arduino">Arduino / Embedded</option>
                        <option value="Raspberry Pi">Raspberry Pi</option>
                        <option value="AI Vision">AI Vision System</option>
                        <option value="Mobile App">Mobile App</option>
                        <option value="Web App">Web App</option>
                        <option value="IoT">IoT Project</option>
                        <option value="Graduation">مشروع تخرج</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>الوصف</label>
                    <textarea id="editDescription" required></textarea>
                </div>
                <div class="form-group">
                    <label>الوسوم</label>
                    <input type="text" id="editTags">
                </div>
                <button type="submit" class="btn-submit" style="width: 100%; margin-top: 20px;">
                    <i class="fas fa-save"></i> حفظ التعديلات
                </button>
            </form>
        </div>
    </div>

    <script>
        // FIX: credentials removed from client — verified server-side only
        const API_URL = "https://script.google.com/macros/s/AKfycbwyk4JAUo9iIcS3q9ZHvovEvkxaTn5K5V1YG0z1QXOqIJKRyx9wUUw_x6S8zfK0CiOX/exec";
        let currentEditId = null;
        let currentDraftId = null;
        let projectsCache = [];
        let autoSaveTimer = null;
        let adminToken = null; // FIX: token received from server after successful login
                // NEW: دوال ضغط وتحويل الصور
        async function compressAndConvertToBase64(file) {
            const options = {
                maxSizeMB: 0.2,
                maxWidthOrHeight: 800,
                useWebWorker: true,
                fileType: 'image/jpeg'
            };
            try {
                const compressedFile = await imageCompression(file, options);
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onloadend = () => resolve(reader.result);
                    reader.readAsDataURL(compressedFile);
                });
            } catch (error) {
                console.error('Compression error:', error);
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onloadend = () => resolve(reader.result);
                    reader.readAsDataURL(file);
                });
            }
        }

        // NEW: معاينة الصورة الرئيسية
        document.getElementById('projectImageFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(ev) {
                    document.getElementById('mainPreviewImg').src = ev.target.result;
                    document.getElementById('mainImagePreview').style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        });

        // NEW: معاينة الصور الإضافية
        document.getElementById('projectImagesFiles').addEventListener('change', function(e) {
            const container = document.getElementById('extraImagesPreview');
            container.innerHTML = '';
            const files = Array.from(e.target.files);
            files.forEach(file => {
                const reader = new FileReader();
                reader.onload = function(ev) {
                    const img = document.createElement('img');
                    img.src = ev.target.result;
                    img.style.width = '80px';
                    img.style.height = '80px';
                    img.style.objectFit = 'cover';
                    img.style.borderRadius = '8px';
                    img.style.border = '1px solid rgba(0,194,209,0.3)';
                    container.appendChild(img);
                };
                reader.readAsDataURL(file);
            });
        });

        document.getElementById('editImageFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const previewDiv = document.getElementById('editMainImagePreview');
            const previewImg = document.getElementById('editMainPreviewImg');
            if (file) {
                const reader = new FileReader();
                reader.onload = function(ev) {
                    previewImg.src = ev.target.result;
                    previewDiv.style.display = 'block';
                    document.getElementById('editImageUrl').value = '';
                };
                reader.readAsDataURL(file);
            } else {
                previewDiv.style.display = 'none';
                previewImg.src = '';
            }
        });

        document.getElementById('editImagesFiles').addEventListener('change', function(e) {
            const container = document.getElementById('editExtraImagesPreview');
            container.innerHTML = '';
            const files = Array.from(e.target.files);
            files.forEach(file => {
                const reader = new FileReader();
                reader.onload = function(ev) {
                    const img = document.createElement('img');
                    img.src = ev.target.result;
                    img.style.width = '80px';
                    img.style.height = '80px';
                    img.style.objectFit = 'cover';
                    img.style.borderRadius = '8px';
                    img.style.border = '1px solid rgba(0,194,209,0.3)';
                    container.appendChild(img);
                };
                reader.readAsDataURL(file);
            });
        });
        let hasUnsavedChanges = false;

        function parseImageUrls(value) {
            if (!value) return [];
            if (Array.isArray(value)) return value;
            return value.split(',').map(url => url.trim()).filter(Boolean);
        }

        async function getCurrentProjectFromFormAsync() {
            let mainImageBase64 = null;
            const mainFile = document.getElementById('projectImageFile').files[0];
            const mainUrl = document.getElementById('projectImageUrl').value;
            
            if (mainFile) {
                mainImageBase64 = await compressAndConvertToBase64(mainFile);
            } else if (mainUrl) {
                mainImageBase64 = mainUrl;
            }
            
            let extraImages = [];
            const extraFiles = document.getElementById('projectImagesFiles').files;
            const extraUrls = document.getElementById('projectImagesUrls').value;
            
            for (let i = 0; i < extraFiles.length; i++) {
                const base64 = await compressAndConvertToBase64(extraFiles[i]);
                extraImages.push(base64);
            }
            
            if (extraUrls) {
                const urls = extraUrls.split(',').map(u => u.trim()).filter(Boolean);
                extraImages.push(...urls);
            }
            
            const allImages = mainImageBase64 ? [mainImageBase64, ...extraImages] : extraImages;
            
            return {
                id: currentDraftId || Date.now(),
                title: document.getElementById('projectTitle').value.trim(),
                images: allImages,
                category: document.getElementById('projectCategory').value,
                description: document.getElementById('projectDescription').value.trim(),
                tags: document.getElementById('projectTags').value.split(',').map(t => t.trim()).filter(Boolean)
            };
        }

        // Auto-save functionality
        function markUnsavedChanges() {
            hasUnsavedChanges = true;
            if (autoSaveTimer) clearTimeout(autoSaveTimer);
            autoSaveTimer = setTimeout(() => {
                if (hasUnsavedChanges) {
                    autoSave();
                }
            }, 5000); // Auto-save after 5 seconds of inactivity
        }

        async function autoSave() {
            if (!hasUnsavedChanges) return;
            const project = await getCurrentProjectFromFormAsync();
            localStorage.setItem('adminDraft', JSON.stringify(project));

            if (!project.title || !project.category || !project.description) {
                hasUnsavedChanges = false;
                return;
            }

            currentDraftId = project.id;
            try {
                await saveProjectToAPI(project);
            } catch (err) {
            }
            hasUnsavedChanges = false;
        }

        // FIX: LOGIN — credentials sent to server, checked there, never validated in client
        async function loginAdmin() {
            const email    = document.getElementById('adminEmail').value.trim();
            const password = document.getElementById('adminPassword').value;
            const status   = document.getElementById('loginStatus');
            const btn      = document.querySelector('.login-box button');

            btn.disabled = true;
            btn.textContent = 'جاري التحقق...';

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'adminLogin',
                        email: email,
                        password: password,
                        userAgent: navigator.userAgent
                    })
                });
                const data = await res.json();

                if (data.result === 'success' && data.token) {
                    adminToken = data.token;
                    sessionStorage.setItem('adminToken', data.token);
                    document.getElementById('loginSection').style.display = 'none';
                    document.getElementById('adminSection').style.display = 'block';
                    loadProjects();
                    status.style.display = 'none';
                } else {
                    throw new Error(data.error || 'فشل تسجيل الدخول');
                }
            } catch (err) {
                status.style.display = 'block';
                status.style.background = 'rgba(255,50,50,0.1)';
                status.style.border = '1px solid rgba(255,80,80,0.3)';
                status.style.color = '#ff6666';
                status.innerHTML = '❌ ' + (err.message || 'البريد الإلكتروني أو كلمة المرور غير صحيحة');
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'دخول <i class="fas fa-arrow-left"></i>';
            }
        }

        function logoutAdmin() {
            sessionStorage.removeItem('adminToken');
            adminToken = null;
            document.getElementById('adminSection').style.display = 'none';
            document.getElementById('loginSection').style.display = 'flex';
            document.getElementById('adminEmail').value = '';
            document.getElementById('adminPassword').value = '';
            document.getElementById('loginStatus').style.display = 'none';
        }

        // CHECK LOGIN ON LOAD
        window.addEventListener('DOMContentLoaded', () => {
            const savedToken = sessionStorage.getItem('adminToken');
            if (savedToken) {
                adminToken = savedToken;
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('adminSection').style.display = 'block';
                loadProjects();
            }

            // Load draft if exists
            const draft = localStorage.getItem('adminDraft');
            if (draft) {
                const data = JSON.parse(draft);
                document.getElementById('projectTitle').value = data.title || '';
                document.getElementById('projectCategory').value = data.category || '';
                document.getElementById('projectDescription').value = data.description || '';
                document.getElementById('projectTags').value = Array.isArray(data.tags) ? data.tags.join(', ') : (data.tags || '');
                document.getElementById('projectImageUrl').value = (data.images && data.images[0]) || '';
                document.getElementById('projectImagesUrls').value = data.images ? data.images.slice(1).join(', ') : '';
            }

            // Add auto-save listeners
            ['projectTitle', 'projectCategory', 'projectDescription', 'projectTags', 'projectImageUrl', 'projectImagesUrls'].forEach(id => {
                document.getElementById(id).addEventListener('input', markUnsavedChanges);
            });
        });

        // TABS
        function showTab(event, tabName) {
            document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tabName).style.display = 'block';
            if (event && event.target) {
                const btn = event.target.closest('.tab-btn');
                if (btn) btn.classList.add('active');
            }
        }

        // Local project persistence fallback
        function getLocalProjects() {
            try {
                return JSON.parse(localStorage.getItem('braintechLocalProjects') || '[]');
            } catch (err) {
                return [];
            }
        }

        function saveLocalProjects(projects) {
            localStorage.setItem('braintechLocalProjects', JSON.stringify(projects));
        }

        function addOrUpdateLocalProject(project) {
            const projects = getLocalProjects();
            const idx = projects.findIndex(p => p.id == project.id);
            if (idx >= 0) {
                projects[idx] = project;
            } else {
                projects.push(project);
            }
            saveLocalProjects(projects);
            projectsCache = projects;
            renderProjects();
        }

        function deleteLocalProject(id) {
            const projects = getLocalProjects().filter(p => p.id != id);
            saveLocalProjects(projects);
            projectsCache = projects;
            renderProjects();
        }

        // PROJECTS API
        async function loadProjects() {
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'loadProjects' })
                });
                if (!response.ok) throw new Error('Network response was not ok');
                const data = await response.json();
                if (data.result === 'success' && data.projects && data.projects.length > 0) {
                    projectsCache = data.projects;
                    saveLocalProjects(projectsCache);
                    renderProjects();
                } else {
                    throw new Error('No projects available from API');
                }
            } catch (error) {
                console.error('Error loading projects:', error);
                projectsCache = getLocalProjects();
                renderProjects();
            }
        }

        async function saveProjectToAPI(project) {
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'saveProject', project: project, token: adminToken })
                });
                if (!response.ok) throw new Error('Network response was not ok');
                const data = await response.json();
                if (data.result === 'success') {
                    await loadProjects(); // Reload to sync
                } else {
                    throw new Error(data.error || 'Failed to save project');
                }
            } catch (error) {
                console.error('Error saving project, using local fallback:', error);
                addOrUpdateLocalProject(project);
            }
        }

        async function deleteProjectFromAPI(id) {
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'deleteProject', id: id, token: adminToken })
                });
                if (!response.ok) throw new Error('Network response was not ok');
                const data = await response.json();
                if (data.result === 'success') {
                    await loadProjects(); // Reload to sync
                } else {
                    throw new Error(data.error || 'Failed to delete project');
                }
            } catch (error) {
                console.error('Error deleting project, using local fallback:', error);
                deleteLocalProject(id);
            }
        }

        // ADD PROJECT
        async function addProject(e) {
            e.preventDefault();
            const status = document.getElementById('addStatus');
            status.className = 'status-msg';
            status.innerHTML = 'جاري رفع الصور وحفظ المشروع...';
            status.classList.add('show');
            try {
                const project = await getCurrentProjectFromFormAsync();
                await saveProjectToAPI(project);
                document.getElementById('projectForm').reset();
                document.getElementById('mainImagePreview').style.display = 'none';
                document.getElementById('extraImagesPreview').innerHTML = '';
                localStorage.removeItem('adminDraft');
                currentDraftId = null;
                status.innerHTML = '✅ تم إضافة المشروع بنجاح!';
                status.classList.add('success');
                setTimeout(() => status.classList.remove('show'), 3000);
            } catch (error) {
                status.innerHTML = '❌ فشل في إضافة المشروع';
                status.classList.add('error');
                console.error(error);
            }
        }

        // RENDER PROJECTS
        function renderProjects() {
            const container = document.getElementById('projectsContainer');
            if (projectsCache.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-inbox"></i>
                        <p>لم يتم إضافة أي مشاريع بعد</p>
                    </div>
                `;
                return;
            }

            let html = '<table class="projects-table"><thead><tr><th>الصورة</th><th>العنوان</th><th>التصنيف</th><th>الإجراءات</th></tr></thead><tbody>';
            projectsCache.forEach(project => {
                const imgSrc = project.images.length > 0 ? project.images[0] : '';
                html += `
                    <tr>
                        <td>${imgSrc ? `<img src="${imgSrc}" alt="${project.title}" class="project-img-thumb" onerror="this.style.display='none'">` : '<span style="color:var(--gray);font-size:0.75rem;">لا توجد صورة</span>'}</td>
                        <td>${project.title}</td>
                        <td>${project.category}</td>
                        <td class="action-btns">
                            <button class="btn-edit" onclick="editProject(${project.id})"><i class="fas fa-edit"></i> تعديل</button>
                            <button class="btn-delete" onclick="deleteProject(${project.id})"><i class="fas fa-trash"></i> حذف</button>
                        </td>
                    </tr>
                `;
            });
            html += '</tbody></table>';
            container.innerHTML = html;
        }

        // EDIT PROJECT
        function editProject(id) {
            const project = projectsCache.find(p => p.id == id);
            if (!project) return;
            currentEditId = id;
            document.getElementById('editTitle').value = project.title;
            document.getElementById('editCategory').value = project.category;
            document.getElementById('editDescription').value = project.description;
            document.getElementById('editTags').value = project.tags.join(', ');

            const primaryUrlInput = document.getElementById('editImageUrl');
            const primaryFileInput = document.getElementById('editImageFile');
            const primaryPreviewDiv = document.getElementById('editMainImagePreview');
            const primaryPreviewImg = document.getElementById('editMainPreviewImg');
            primaryFileInput.value = '';
            primaryPreviewDiv.style.display = 'none';
            primaryPreviewImg.src = '';

            const firstImage = project.images && project.images[0] ? project.images[0] : '';
            if (firstImage && firstImage.startsWith('data:image')) {
                primaryUrlInput.value = '';
                primaryPreviewDiv.style.display = 'block';
                primaryPreviewImg.src = firstImage;
            } else {
                primaryUrlInput.value = firstImage;
            }

            const extraPreview = document.getElementById('editExtraImagesPreview');
            extraPreview.innerHTML = '';
            document.getElementById('editImagesFiles').value = '';
            const extraImages = project.images && project.images.length > 1 ? project.images.slice(1) : [];
            extraImages.forEach(image => {
                const img = document.createElement('img');
                img.src = image;
                img.style.width = '80px';
                img.style.height = '80px';
                img.style.objectFit = 'cover';
                img.style.borderRadius = '8px';
                img.style.border = '1px solid rgba(0,194,209,0.3)';
                extraPreview.appendChild(img);
            });
            document.getElementById('editImagesUrls').value = (project.images && project.images.slice(1).join(', ')) || '';
            document.getElementById('editModal').classList.add('open');
        }

        // SAVE EDITED PROJECT
        async function saveProject(e) {
            e.preventDefault();
            const status = document.getElementById('manageStatus');
            status.className = 'status-msg';
            status.innerHTML = 'جاري الحفظ...';
            status.classList.add('show');

            try {
                const project = projectsCache.find(p => p.id == currentEditId) || {};
                const images = project.images ? [...project.images] : [];
                const primaryFile = document.getElementById('editImageFile').files[0];
                const primaryUrl = document.getElementById('editImageUrl').value.trim();
                const extraFiles = document.getElementById('editImagesFiles').files;
                const extraUrls = document.getElementById('editImagesUrls').value;

                if (primaryFile) {
                    const primaryBase64 = await compressAndConvertToBase64(primaryFile);
                    if (images.length > 0) images[0] = primaryBase64;
                    else images.unshift(primaryBase64);
                } else if (primaryUrl) {
                    if (images.length > 0) images[0] = primaryUrl;
                    else images.unshift(primaryUrl);
                }

                const extraImages = [];
                for (let i = 0; i < extraFiles.length; i++) {
                    const base64 = await compressAndConvertToBase64(extraFiles[i]);
                    extraImages.push(base64);
                }
                if (extraUrls) {
                    extraImages.push(...parseImageUrls(extraUrls));
                }
                if (extraImages.length > 0) {
                    const primaryImage = images.length > 0 ? images[0] : null;
                    images.length = 0;
                    if (primaryImage) images.push(primaryImage);
                    images.push(...extraImages);
                }

                const updatedProject = {
                    id: currentEditId,
                    title: document.getElementById('editTitle').value.trim(),
                    images: images,
                    category: document.getElementById('editCategory').value,
                    description: document.getElementById('editDescription').value.trim(),
                    tags: document.getElementById('editTags').value.split(',').map(t => t.trim()).filter(t => t)
                };

                await saveProjectToAPI(updatedProject);
                closeModal();
                status.innerHTML = '✅ تم حفظ التعديلات بنجاح!';
                status.classList.add('success');
                setTimeout(() => status.classList.remove('show'), 3000);
            } catch (error) {
                status.innerHTML = '❌ فشل في حفظ التعديلات';
                status.classList.add('error');
                console.error(error);
            }
        }

        // DELETE PROJECT
        async function deleteProject(id) {
            if (!confirm('هل أنت متأكد من حذف هذا المشروع؟')) return;

            const status = document.getElementById('manageStatus');
            status.className = 'status-msg';
            status.innerHTML = 'جاري الحذف...';
            status.classList.add('show');

            try {
                await deleteProjectFromAPI(id);
                status.innerHTML = '✅ تم حذف المشروع بنجاح!';
                status.classList.add('success');
                setTimeout(() => status.classList.remove('show'), 3000);
            } catch (error) {
                status.innerHTML = '❌ فشل في حذف المشروع';
                status.classList.add('error');
                console.error(error);
            }
        }

        // CLOSE MODAL
        function closeModal() {
            document.getElementById('editModal').classList.remove('open');
            document.getElementById('editForm').reset();
            document.getElementById('editMainImagePreview').style.display = 'none';
            document.getElementById('editMainPreviewImg').src = '';
            document.getElementById('editExtraImagesPreview').innerHTML = '';
            currentEditId = null;
        }
    </script>
</body>
</html>
