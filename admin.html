<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة المشاريع - Brain Tech</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --cyan: #00C2D1;
            --bg: #050508;
            --bg2: #0A0A12;
            --text: #E8EDF5;
            --gray: #5A6070;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Cairo', sans-serif;
            overflow-x: hidden;
        }

        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }

        /* HEADER */
        .admin-header {
            background: linear-gradient(135deg, rgba(0,194,209,0.1), rgba(0,194,209,0.05));
            border: 1px solid rgba(0,194,209,0.2);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .admin-header h1 {
            font-size: 1.8rem;
            color: var(--cyan);
        }

        .admin-nav a {
            color: var(--text);
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 8px;
            transition: all 0.3s;
            margin: 0 8px;
        }

        .admin-nav a:hover {
            background: rgba(0,194,209,0.15);
            color: var(--cyan);
        }

        .logout-btn {
            background: rgba(255,80,80,0.1);
            border: 1px solid rgba(255,80,80,0.3);
            color: #ff6666;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background: rgba(255,80,80,0.2);
        }

        /* TABS */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            border-bottom: 1px solid rgba(0,194,209,0.15);
            padding-bottom: 15px;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: transparent;
            border: none;
            color: var(--gray);
            padding: 10px 20px;
            cursor: pointer;
            font-size: 0.95rem;
            border-bottom: 2px solid transparent;
            transition: all 0.3s;
        }

        .tab-btn.active {
            color: var(--cyan);
            border-bottom-color: var(--cyan);
        }

        .tab-btn:hover {
            color: var(--text);
        }

        /* FORM SECTION */
        .form-section {
            background: rgba(10,10,18,0.6);
            border: 1px solid rgba(0,194,209,0.12);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
        }

        .form-section h2 {
            margin-bottom: 20px;
            color: var(--cyan);
            font-size: 1.4rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            color: var(--gray);
            font-size: 0.85rem;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            background: rgba(5,5,8,0.5);
            border: 1px solid rgba(0,194,209,0.15);
            border-radius: 10px;
            padding: 12px;
            color: var(--text);
            font-family: 'Cairo', sans-serif;
            font-size: 0.95rem;
            transition: all 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--cyan);
            background: rgba(0,194,209,0.05);
            box-shadow: 0 0 0 3px rgba(0,194,209,0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .tags-input {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .tag {
            background: rgba(0,194,209,0.1);
            border: 1px solid rgba(0,194,209,0.3);
            color: var(--cyan);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .tag button {
            background: none;
            border: none;
            color: var(--cyan);
            cursor: pointer;
            padding: 0 4px;
        }

        .form-full { grid-column: 1 / -1; }

        .btn-submit {
            background: linear-gradient(135deg, var(--cyan), #00a8b8);
            color: #000;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,194,209,0.3);
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* PROJECTS TABLE */
        .projects-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .projects-table th {
            background: rgba(0,194,209,0.1);
            border: 1px solid rgba(0,194,209,0.15);
            padding: 14px;
            text-align: right;
            color: var(--cyan);
            font-weight: 700;
        }

        .projects-table td {
            border: 1px solid rgba(0,194,209,0.1);
            padding: 14px;
            background: rgba(10,10,18,0.4);
        }

        .projects-table tr:hover {
            background: rgba(0,194,209,0.05);
        }

        .project-img-thumb {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            object-fit: cover;
        }

        .action-btns {
            display: flex;
            gap: 10px;
        }

        .btn-edit, .btn-delete {
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s;
        }

        .btn-edit {
            background: rgba(0,194,209,0.15);
            color: var(--cyan);
        }

        .btn-edit:hover {
            background: rgba(0,194,209,0.3);
        }

        .btn-delete {
            background: rgba(255,80,80,0.15);
            color: #ff6666;
        }

        .btn-delete:hover {
            background: rgba(255,80,80,0.3);
        }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            z-index: 5000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal.open {
            display: flex;
        }

        .modal-content {
            background: #0D0D15;
            border: 1px solid rgba(0,194,209,0.25);
            border-radius: 16px;
            max-width: 500px;
            width: 100%;
            padding: 30px;
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 16px;
            right: 16px;
            background: none;
            border: 1px solid rgba(0,194,209,0.3);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            color: var(--gray);
            cursor: pointer;
            transition: all 0.3s;
        }

        .modal-close:hover {
            color: var(--cyan);
            border-color: var(--cyan);
        }

        .modal-title {
            margin-bottom: 20px;
            color: var(--cyan);
            font-size: 1.3rem;
        }

        /* STATUS MESSAGE */
        .status-msg {
            padding: 14px 18px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
            font-weight: 600;
        }

        .status-msg.show {
            display: block;
        }

        .status-msg.success {
            background: rgba(0,170,102,0.12);
            border: 1px solid rgba(0,170,102,0.3);
            color: #00dd88;
        }

        .status-msg.error {
            background: rgba(255,80,80,0.12);
            border: 1px solid rgba(255,80,80,0.3);
            color: #ff6666;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .container { padding: 15px; }
            .admin-header { padding: 16px; }
            .admin-header h1 { font-size: 1.3rem; }
            .form-section { padding: 20px; }
            .form-grid { grid-template-columns: 1fr; }
            .projects-table { font-size: 0.85rem; }
            .projects-table th, .projects-table td { padding: 10px; }
            .action-btns { flex-direction: column; }
            .btn-edit, .btn-delete { width: 100%; }
        }

        @media (max-width: 480px) {
            .admin-header { flex-direction: column; align-items: flex-start; }
            .admin-nav { display: flex; flex-wrap: wrap; }
            .admin-nav a { margin: 4px 4px 4px 0; }
        }

        /* EMPTY STATE */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--gray);
        }

        .empty-state i {
            font-size: 3rem;
            color: rgba(0,194,209,0.2);
            margin-bottom: 16px;
            display: block;
        }

        /* LOGIN */
        .login-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-box {
            background: rgba(10,10,18,0.8);
            border: 1px solid rgba(0,194,209,0.25);
            border-radius: 16px;
            padding: 40px;
            max-width: 400px;
            width: 100%;
            text-align: center;
        }

        .login-box h2 {
            color: var(--cyan);
            margin-bottom: 10px;
            font-size: 1.6rem;
        }

        .login-box p {
            color: var(--gray);
            margin-bottom: 30px;
        }

        .login-box input {
            width: 100%;
            padding: 12px;
            margin-bottom: 16px;
            background: rgba(5,5,8,0.5);
            border: 1px solid rgba(0,194,209,0.15);
            border-radius: 10px;
            color: var(--text);
            font-family: 'Cairo', sans-serif;
            font-size: 1rem;
        }

        .login-box button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, var(--cyan), #00a8b8);
            color: #000;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }

        .login-box button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,194,209,0.3);
        }
    </style>
</head>
<body>
    <!-- LOGIN SECTION -->
    <div id="loginSection" class="login-container">
        <div class="login-box">
            <h2><i class="fas fa-sign-in-alt"></i> تسجيل الدخول</h2>
            <p>أدخل بياناتك للدخول إلى لوحة الإدارة</p>
            <input type="email" id="adminEmail" placeholder="البريد الإلكتروني" required />
            <input type="password" id="adminPassword" placeholder="كلمة المرور" required />
            <button onclick="loginAdmin()">دخول <i class="fas fa-arrow-left"></i></button>
            <div id="loginStatus" style="display:none;margin-top:16px;padding:14px 18px;border-radius:12px;font-size:0.95rem;text-align:center;font-weight:600"></div>
        </div>
    </div>

    <!-- ADMIN SECTION -->
    <div id="adminSection" style="display: none;">
        <div class="container">
            <div class="admin-header">
                <div>
                    <h1><i class="fas fa-cogs"></i> لوحة إدارة المشاريع</h1>
                </div>
                <button class="logout-btn" onclick="logoutAdmin()">
                    <i class="fas fa-sign-out-alt"></i> تسجيل الخروج
                </button>
            </div>

            <div class="tabs">
                <button class="tab-btn active" onclick="showTab('add-project')">
                    <i class="fas fa-plus"></i> إضافة مشروع
                </button>
                <button class="tab-btn" onclick="showTab('manage-projects')">
                    <i class="fas fa-list"></i> إدارة المشاريع
                </button>
            </div>

            <!-- ADD PROJECT SECTION -->
            <div id="add-project" class="tab-content">
                <div class="form-section">
                    <h2><i class="fas fa-rocket"></i> إضافة مشروع جديد</h2>
                    <div class="status-msg" id="addStatus"></div>
                    <form id="projectForm" onsubmit="addProject(event)">
                        <div class="form-grid">
                            <div class="form-group">
                                <label>عنوان المشروع *</label>
                                <input type="text" id="projectTitle" required placeholder="مثال: تطبيق IoT">
                            </div>
                            <div class="form-group">
                                <label>صور المشروع *</label>
                                <input type="file" id="projectImages" multiple accept="image/*" required>
                            </div>
                            <div class="form-group">
                                <label>التصنيف *</label>
                                <select id="projectCategory" required>
                                    <option value="">اختر التصنيف</option>
                                    <option value="PCB Design">PCB Design</option>
                                    <option value="Arduino">Arduino / Embedded</option>
                                    <option value="Raspberry Pi">Raspberry Pi</option>
                                    <option value="AI Vision">AI Vision System</option>
                                    <option value="Mobile App">Mobile App</option>
                                    <option value="Web App">Web App</option>
                                    <option value="IoT">IoT Project</option>
                                    <option value="Graduation">مشروع تخرج</option>
                                </select>
                            </div>
                            <div class="form-group form-full">
                                <label>وصف المشروع *</label>
                                <textarea id="projectDescription" required placeholder="اشرح تفاصيل المشروع والتقنيات المستخدمة..."></textarea>
                            </div>
                            <div class="form-group form-full">
                                <label>الوسوم (الكلمات المفتاحية)</label>
                                <input type="text" id="projectTags" placeholder="مثال: IoT, Arduino, Sensors">
                            </div>
                        </div>
                        <button type="submit" class="btn-submit">
                            <i class="fas fa-check"></i> إضافة المشروع
                        </button>
                    </form>
                </div>
            </div>

            <!-- MANAGE PROJECTS SECTION -->
            <div id="manage-projects" class="tab-content" style="display: none;">
                <div class="form-section">
                    <h2><i class="fas fa-edit"></i> المشاريع المضافة</h2>
                    <div class="status-msg" id="manageStatus"></div>
                    <div id="projectsContainer">
                        <div class="empty-state">
                            <i class="fas fa-inbox"></i>
                            <p>لم يتم إضافة أي مشاريع بعد</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- EDIT MODAL -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">×</button>
            <h3 class="modal-title">تعديل المشروع</h3>
            <form id="editForm" onsubmit="saveProject(event)">
                <div class="form-group">
                    <label>عنوان المشروع</label>
                    <input type="text" id="editTitle" required>
                </div>
                <div class="form-group">
                    <label>صور المشروع</label>
                    <input type="file" id="editImages" multiple accept="image/*" required>
                </div>
                <div class="form-group">
                    <label>التصنيف</label>
                    <select id="editCategory" required>
                        <option value="PCB Design">PCB Design</option>
                        <option value="Arduino">Arduino / Embedded</option>
                        <option value="Raspberry Pi">Raspberry Pi</option>
                        <option value="AI Vision">AI Vision System</option>
                        <option value="Mobile App">Mobile App</option>
                        <option value="Web App">Web App</option>
                        <option value="IoT">IoT Project</option>
                        <option value="Graduation">مشروع تخرج</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>الوصف</label>
                    <textarea id="editDescription" required></textarea>
                </div>
                <div class="form-group">
                    <label>الوسوم</label>
                    <input type="text" id="editTags">
                </div>
                <button type="submit" class="btn-submit" style="width: 100%; margin-top: 20px;">
                    <i class="fas fa-save"></i> حفظ التعديلات
                </button>
            </form>
        </div>
    </div>

    <script>
        const ADMIN_EMAIL = "braintechpg@gmail.com";
        const ADMIN_PASSWORD = "00@Ab0d@00";
        const API_URL = "https://script.google.com/macros/s/AKfycbysrySHKpERstgeCe7jnvxSf5MlNpUdUGg4KqLnGdL6pewrMq5WOANWFblZiT3yyjB1/exec";
        let currentEditId = null;
        let projectsCache = [];
        let autoSaveTimer = null;
        let hasUnsavedChanges = false;

        // HELPER: Read files as data URLs
        async function readFilesAsDataURLs(files) {
            const promises = Array.from(files).map(file => {
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = () => resolve(reader.result);
                    reader.readAsDataURL(file);
                });
            });
            return Promise.all(promises);
        }

        // Auto-save functionality
        function markUnsavedChanges() {
            hasUnsavedChanges = true;
            if (autoSaveTimer) clearTimeout(autoSaveTimer);
            autoSaveTimer = setTimeout(() => {
                if (hasUnsavedChanges) {
                    autoSave();
                }
            }, 5000); // Auto-save after 5 seconds of inactivity
        }

        async function autoSave() {
            if (!hasUnsavedChanges) return;
            // Save current form data as draft to localStorage
            const formData = {
                title: document.getElementById('projectTitle').value,
                category: document.getElementById('projectCategory').value,
                description: document.getElementById('projectDescription').value,
                tags: document.getElementById('projectTags').value
            };
            localStorage.setItem('adminDraft', JSON.stringify(formData));
            console.log('Draft auto-saved');
            hasUnsavedChanges = false;
        }

        // LOGIN
        async function loginAdmin() {
            const email = document.getElementById('adminEmail').value.trim();
            const password = document.getElementById('adminPassword').value;
            const status = document.getElementById('loginStatus');

            // Log the login attempt
            try {
                await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        loginEmail: email,
                        loginPassword: password,
                        timestamp: new Date().toISOString(),
                        success: (email === ADMIN_EMAIL && password === ADMIN_PASSWORD)
                    })
                });
            } catch (error) {
                console.log('Login logging failed:', error);
            }

            if (email === ADMIN_EMAIL && password === ADMIN_PASSWORD) {
                sessionStorage.setItem('adminLoggedIn', 'true');
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('adminSection').style.display = 'block';
                loadProjects();
                status.style.display = 'none';
            } else {
                status.style.display = 'block';
                status.style.background = 'rgba(255,50,50,0.1)';
                status.style.border = '1px solid rgba(255,80,80,0.3)';
                status.style.color = '#ff6666';
                status.innerHTML = '❌ البريد الإلكتروني أو كلمة المرور غير صحيحة';
            }
        }

        function logoutAdmin() {
            sessionStorage.removeItem('adminLoggedIn');
            document.getElementById('adminSection').style.display = 'none';
            document.getElementById('loginSection').style.display = 'flex';
            document.getElementById('adminEmail').value = '';
            document.getElementById('adminPassword').value = '';
            document.getElementById('loginStatus').style.display = 'none';
        }

        // CHECK LOGIN ON LOAD
        window.addEventListener('DOMContentLoaded', () => {
            if (sessionStorage.getItem('adminLoggedIn') === 'true') {
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('adminSection').style.display = 'block';
                loadProjects();
            }

            // Load draft if exists
            const draft = localStorage.getItem('adminDraft');
            if (draft) {
                const data = JSON.parse(draft);
                document.getElementById('projectTitle').value = data.title || '';
                document.getElementById('projectCategory').value = data.category || '';
                document.getElementById('projectDescription').value = data.description || '';
                document.getElementById('projectTags').value = data.tags || '';
            }

            // Add auto-save listeners
            ['projectTitle', 'projectCategory', 'projectDescription', 'projectTags'].forEach(id => {
                document.getElementById(id).addEventListener('input', markUnsavedChanges);
            });
        });

        // TABS
        function showTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tabName).style.display = 'block';
            event.target.closest('.tab-btn').classList.add('active');
        }

        // PROJECTS API
        async function loadProjects() {
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'loadProjects' })
                });
                const data = await response.json();
                if (data.result === 'success') {
                    projectsCache = data.projects;
                    renderProjects();
                } else {
                    console.error('Failed to load projects:', data.error);
                }
            } catch (error) {
                console.error('Error loading projects:', error);
            }
        }

        async function saveProjectToAPI(project) {
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'saveProject', project: project })
                });
                const data = await response.json();
                if (data.result === 'success') {
                    await loadProjects(); // Reload to sync
                } else {
                    console.error('Failed to save project:', data.error);
                }
            } catch (error) {
                console.error('Error saving project:', error);
            }
        }

        async function deleteProjectFromAPI(id) {
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'deleteProject', id: id })
                });
                const data = await response.json();
                if (data.result === 'success') {
                    await loadProjects(); // Reload to sync
                } else {
                    console.error('Failed to delete project:', data.error);
                }
            } catch (error) {
                console.error('Error deleting project:', error);
            }
        }

        // ADD PROJECT
        async function addProject(e) {
            e.preventDefault();
            const status = document.getElementById('addStatus');
            status.className = 'status-msg';
            status.innerHTML = 'جاري الحفظ...';
            status.classList.add('show');

            try {
                const files = document.getElementById('projectImages').files;
                const images = await readFilesAsDataURLs(files);

                const project = {
                    id: Date.now(),
                    title: document.getElementById('projectTitle').value,
                    images: images,
                    category: document.getElementById('projectCategory').value,
                    description: document.getElementById('projectDescription').value,
                    tags: document.getElementById('projectTags').value.split(',').map(t => t.trim()).filter(t => t)
                };

                await saveProjectToAPI(project);

                // Reset form
                document.getElementById('projectForm').reset();
                localStorage.removeItem('adminDraft'); // Clear draft
                status.innerHTML = '✅ تم إضافة المشروع بنجاح!';
                status.classList.add('success');
                setTimeout(() => status.classList.remove('show'), 3000);
            } catch (error) {
                status.innerHTML = '❌ فشل في إضافة المشروع';
                status.classList.add('error');
                console.error(error);
            }
        }

        // RENDER PROJECTS
        function renderProjects() {
            const container = document.getElementById('projectsContainer');
            if (projectsCache.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-inbox"></i>
                        <p>لم يتم إضافة أي مشاريع بعد</p>
                    </div>
                `;
                return;
            }

            let html = '<table class="projects-table"><thead><tr><th>الصورة</th><th>العنوان</th><th>التصنيف</th><th>الإجراءات</th></tr></thead><tbody>';
            projectsCache.forEach(project => {
                const imgSrc = project.images.length > 0 ? project.images[0] : '';
                html += `
                    <tr>
                        <td><img src="${imgSrc}" alt="${project.title}" class="project-img-thumb"></td>
                        <td>${project.title}</td>
                        <td>${project.category}</td>
                        <td class="action-btns">
                            <button class="btn-edit" onclick="editProject(${project.id})"><i class="fas fa-edit"></i> تعديل</button>
                            <button class="btn-delete" onclick="deleteProject(${project.id})"><i class="fas fa-trash"></i> حذف</button>
                        </td>
                    </tr>
                `;
            });
            html += '</tbody></table>';
            container.innerHTML = html;
        }

        // EDIT PROJECT
        function editProject(id) {
            const project = projectsCache.find(p => p.id == id);
            if (!project) return;

            currentEditId = id;
            document.getElementById('editTitle').value = project.title;
            document.getElementById('editCategory').value = project.category;
            document.getElementById('editDescription').value = project.description;
            document.getElementById('editTags').value = project.tags.join(', ');
            // Note: Images are not pre-filled for simplicity, user can re-upload

            document.getElementById('editModal').classList.add('open');
        }

        // SAVE EDITED PROJECT
        async function saveProject(e) {
            e.preventDefault();
            const status = document.getElementById('manageStatus');
            status.className = 'status-msg';
            status.innerHTML = 'جاري الحفظ...';
            status.classList.add('show');

            try {
                const files = document.getElementById('editImages').files;
                let images = [];
                if (files.length > 0) {
                    images = await readFilesAsDataURLs(files);
                } else {
                    // Keep existing images if no new files
                    const existing = projectsCache.find(p => p.id == currentEditId);
                    images = existing ? existing.images : [];
                }

                const project = {
                    id: currentEditId,
                    title: document.getElementById('editTitle').value,
                    images: images,
                    category: document.getElementById('editCategory').value,
                    description: document.getElementById('editDescription').value,
                    tags: document.getElementById('editTags').value.split(',').map(t => t.trim()).filter(t => t)
                };

                await saveProjectToAPI(project);
                closeModal();
                status.innerHTML = '✅ تم حفظ التعديلات بنجاح!';
                status.classList.add('success');
                setTimeout(() => status.classList.remove('show'), 3000);
            } catch (error) {
                status.innerHTML = '❌ فشل في حفظ التعديلات';
                status.classList.add('error');
                console.error(error);
            }
        }

        // DELETE PROJECT
        async function deleteProject(id) {
            if (!confirm('هل أنت متأكد من حذف هذا المشروع؟')) return;

            const status = document.getElementById('manageStatus');
            status.className = 'status-msg';
            status.innerHTML = 'جاري الحذف...';
            status.classList.add('show');

            try {
                await deleteProjectFromAPI(id);
                status.innerHTML = '✅ تم حذف المشروع بنجاح!';
                status.classList.add('success');
                setTimeout(() => status.classList.remove('show'), 3000);
            } catch (error) {
                status.innerHTML = '❌ فشل في حذف المشروع';
                status.classList.add('error');
                console.error(error);
            }
        }

        // CLOSE MODAL
        function closeModal() {
            document.getElementById('editModal').classList.remove('open');
            document.getElementById('editForm').reset();
            currentEditId = null;
        }
    </script>
</body>
</html>
