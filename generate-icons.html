<!DOCTYPE html>
<html>
<head>
    <title>Generate PWA Icons</title>
</head>
<body>
    <h1>Generating PWA Icons for Brain Tech...</h1>
    <div id="status">Processing...</div>

    <script>
        // Icon sizes needed for PWA
        const sizes = [16, 32, 180, 192, 512];

        // Load the SVG
        fetch('/icons/icon.svg')
            .then(response => response.text())
            .then(svgText => {
                const promises = sizes.map(size => generateIcon(svgText, size));
                return Promise.all(promises);
            })
            .then(() => {
                document.getElementById('status').innerHTML = '✅ All icons generated successfully!<br>Icons created: favicon-16x16.png, favicon-32x32.png, apple-touch-icon.png, android-chrome-192x192.png, android-chrome-512x512.png';
            })
            .catch(error => {
                document.getElementById('status').innerHTML = '❌ Error generating icons: ' + error.message;
                console.error(error);
            });

        function generateIcon(svgText, size) {
            return new Promise((resolve, reject) => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = size;
                canvas.height = size;

                // Create image from SVG
                const img = new Image();
                img.onload = () => {
                    ctx.drawImage(img, 0, 0, size, size);

                    // Convert to blob and download
                    canvas.toBlob(blob => {
                        const url = URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        let filename;
                        if (size === 16) filename = 'favicon-16x16.png';
                        else if (size === 32) filename = 'favicon-32x32.png';
                        else if (size === 180) filename = 'apple-touch-icon.png';
                        else if (size === 192) filename = 'android-chrome-192x192.png';
                        else if (size === 512) filename = 'android-chrome-512x512.png';

                        a.href = url;
                        a.download = filename;
                        document.body.appendChild(a);
                        a.click();
                        document.body.removeChild(a);
                        URL.revokeObjectURL(url);
                        resolve();
                    });
                };
                img.onerror = reject;
                img.src = 'data:image/svg+xml;base64,' + btoa(svgText);
            });
        }
    </script>
</body>
</html>
